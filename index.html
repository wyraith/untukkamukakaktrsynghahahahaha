<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    
    <title>Adalah Pokonya</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a18cd1, #fbc2eb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow-x: hidden; /* Mencegah scroll horizontal jika tombol kabur ke pinggir */
            position: relative;
            padding: 20px; /* Jarak aman agar kartu tidak nempel ke pinggir layar HP */
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .emoji-bg {
            position: absolute;
            font-size: 2.5rem;
            color: rgba(255, 255, 255, 0.7);
            user-select: none;
            pointer-events: none;
            animation: floatUp 10s infinite linear;
            z-index: 1;
        }

        @keyframes floatUp {
            0% { 
                transform: translateY(110vh) translateX(-50px) rotate(0deg); 
                opacity: 0;
            }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { 
                transform: translateY(-20vh) translateX(50px) rotate(360deg); 
                opacity: 0;
            }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            padding: 30px 20px; /* Sedikit diperkecil untuk HP */
            text-align: center;
            width: 100%;
            max-width: 420px;
            max-height: 90vh; /* Agar tidak melebihi tinggi layar ponsel pintar */
            overflow-y: auto; /* Jika teks kepanjangan di HP pendek, kartu bisa di-scroll internal */
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
            z-index: 10;
            transition: transform 0.3s ease;
            animation: floatUpIn 1s ease-out forwards;
        }

        /* Menyembunyikan scrollbar bawaan untuk tampilan estetik */
        .glass-card::-webkit-scrollbar {
            width: 4px;
        }
        .glass-card::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
        }

        .glass-card:hover {
            transform: translateY(-5px);
        }

        .gif-container {
            margin-bottom: 20px;
            overflow: hidden;
            border-radius: 15px;
            min-height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .gif-container img {
            width: 100%; 
            height: auto; 
            max-width: 180px; /* Dioptimalkan ukurannya agar seimbang di HP */
            border-radius: 15px;
            pointer-events: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: block;
        }

        h1 {
            color: #fff;
            font-size: 1.8rem; /* Sedikit diperkecil agar tidak pecah jadi 3 baris di HP */
            font-weight: 900;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            line-height: 1.2;
        }

        p {
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 25px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }

        .story-text {
            font-size: 0.95rem !important; /* Ukuran teks cerita disesuaikan agar nyaman dibaca di HP */
            line-height: 1.6;
            text-align: justify;
            margin-bottom: 20px;
            padding: 0 5px;
        }

        .closing-text {
            font-size: 1.3rem !important;
            font-weight: 900;
            color: #fff;
            display: block;
            margin-top: 25px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            position: relative;
            min-height: 50px; /* Menjaga space tombol tetap aman */
        }

        button {
            font-size: 1rem;
            font-weight: 800;
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #btn-yes {
            background-color: #fff;
            color: #ff4757;
            box-shadow: 0 6px 12px rgba(255, 255, 255, 0.3), 0 3px 0 #e2e2e2;
        }

        #btn-yes:active {
            transform: translateY(3px);
            box-shadow: 0 2px 5px rgba(255, 255, 255, 0.3), 0 0 0 #e2e2e2;
        }

        #btn-no {
            background-color: #ff4757;
            color: #fff;
            box-shadow: 0 6px 12px rgba(255, 71, 87, 0.4), 0 3px 0 #d63031;
            position: relative; 
            z-index: 100;
        }

        #btn-next {
            background-color: #4cd137;
            color: #fff;
            box-shadow: 0 6px 12px rgba(76, 209, 55, 0.4), 0 3px 0 #44bd32;
            display: inline-block;
            margin-top: 10px;
            animation: pulse 1.5s infinite;
        }

        #btn-next:active {
            transform: translateY(3px);
            box-shadow: 0 2px 5px rgba(76, 209, 55, 0.3), 0 0 0 #44bd32;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .hidden {
            display: none !important;
        }

        @keyframes floatUpIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Responsivitas Layar Sangat Kecil (Contoh: Jaringan HP Jadul / Lipat) */
        @media (max-width: 360px) {
            h1 { font-size: 1.5rem; }
            button { font-size: 0.9rem; padding: 10px 20px; }
            .gif-container img { max-width: 150px; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="b.mp3" type="audio/mpeg">
    </audio>

    <div id="emoji-container"></div>

    <div class="glass-card" id="main-card">
        <div class="gif-container">
            <img id="cat-gif" src="pp.png" alt="Cute cat crying">
        </div>
        
        <h1 id="title">Maafin Aku Ya? 🥺</h1>
        <p id="desc">maaff ya kakak aku jahat banget ke kakak 👉👈</p>
        
        <div class="btn-container">
            <button id="btn-yes" onclick="dimaafin()">Iyaaa</button>
            <button id="btn-no" onmouseover="kabur()" onclick="kabur()">Gak!</button>
        </div>

        <button id="btn-next" class="hidden" onclick="lanjutCerita()">Lanjut Mau Cerita</button>
    </div>

    <script>
        const bgMusic = document.getElementById('bg-music');

        function playAudioOnInteraction() {
            bgMusic.play().catch(error => {
                console.log("Autoplay dicegah browser.");
            });
            document.removeEventListener('click', playAudioOnInteraction);
            document.removeEventListener('touchstart', playAudioOnInteraction);
        }
        document.addEventListener('click', playAudioOnInteraction);
        document.addEventListener('touchstart', playAudioOnInteraction);

        function createFloatingEmoji() {
            const container = document.getElementById('emoji-container');
            const emojis = ['🥺', '🙏', '😭', '💔'];
            const emojiCount = 10; // Dikurangi sedikit agar tidak terlalu berat di HP beban ram kecil

            for (let i = 0; i < emojiCount; i++) {
                const emoji = document.createElement('div');
                emoji.className = 'emoji-bg';
                emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                emoji.style.left = Math.random() * 90 + 'vw'; /* Menghindari overflow kanan luar layar */
                emoji.style.fontSize = (Math.random() * 1 + 1.8) + 'rem';
                emoji.style.animationDuration = (Math.random() * 5 + 8) + 's';
                emoji.style.animationDelay = (Math.random() * 8) + 's';
                container.appendChild(emoji);
            }
        }

        window.addEventListener('load', createFloatingEmoji);

        const btnNo = document.getElementById('btn-no');
        
        btnNo.addEventListener('touchstart', (e) => {
            e.preventDefault();
            kabur();
        });

        function kabur() {
            bgMusic.play();
            btnNo.style.position = 'fixed';
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;
            const btnWidth = btnNo.offsetWidth;
            const btnHeight = btnNo.offsetHeight;
            
            // Memberikan padding batas aman sebesar 20px dari pinggiran layar asli HP agar tombol tidak hilang total
            const randomX = Math.floor(Math.random() * (screenWidth - btnWidth - 40)) + 20;
            const randomY = Math.floor(Math.random() * (screenHeight - btnHeight - 40)) + 20;
            
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
            
            const randomRot = Math.floor(Math.random() * 40) - 20; 
            btnNo.style.transform = `rotate(${randomRot}deg)`;
        }

        // --- HALAMAN 2 (Setelah Klik Iyaaa) ---
        function dimaafin() {
            bgMusic.play();
            document.getElementById('cat-gif').src = "pp2.png";
            document.getElementById('title').innerText = "YAYYY! MAKASIHH! 🥰";
            document.getElementById('desc').innerText = "hehehe kakak baik dehh 🤞❤️";
            
            document.querySelector('.btn-container').classList.add('hidden');
            document.getElementById('btn-next').classList.remove('hidden');
            
            const floatingEmojis = document.querySelectorAll('.emoji-bg');
            floatingEmojis.forEach(el => {
                el.innerText = '❤️';
                el.style.color = '#ff4757';
                el.style.opacity = '0.9';
                el.style.animationDuration = '4s';
            });

            var duration = 2.5 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 45,
                    origin: { x: 0 },
                    colors: ['#ff9a9e', '#fecfef', '#ffffff', '#ff4757']
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 45,
                    origin: { x: 1 },
                    colors: ['#ff9a9e', '#fecfef', '#ffffff', '#ff4757']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        // --- HALAMAN 3 (Bagian Cerita) ---
        function lanjutCerita() {
            document.getElementById('cat-gif').src = "pp3.png";
            document.getElementById('title').innerText = "Aku Mau Cerita Nihh 🥰";
            
            const descEl = document.getElementById('desc');
            descEl.classList.add('story-text');
            
            descEl.innerHTML = "kak, jujur aku nyaman sama kakak. aku suka dan sayang pake bgt (walaupun suka bikin nangis kk hh). aku tau ko kak emg sesayang dan sesuka itu sama aku, sampe2 masih bertahan hehe. aku cuma mau jalanin pelan-pelan aja, kenal lebih jauh, tanpa harus buru-buru kak. semoga kakak ngerti ya :). maaf ya kak aku selalu nyakitin perasaan kakak , kalo ga dimaapin gapapa si emg jahat akunya wkwk.";
            
            const btnNext = document.getElementById('btn-next');
            btnNext.innerText = "Penutupan";
            btnNext.setAttribute('onclick', 'penutupan()');
        }

        // --- HALAMAN 4 (Penutupan Akhir) ---
        function penutupan() {
            document.getElementById('cat-gif').src = "pp2.png"; 
            document.getElementById('title').innerText = "Daaa Kakak! 👋❤️";
            
            const descEl = document.getElementById('desc');
            descEl.classList.remove('story-text');
            descEl.innerHTML = "Makasih banyak ya udah mau luangin waktunya hehe. <br><span class='closing-text'>mwah ❤️</span>";
            
            document.getElementById('btn-next').classList.add('hidden');

            var duration = 2.5 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 4,
                    angle: 60,
                    spread: 50,
                    origin: { x: 0 },
                    colors: ['#ff9a9e', '#fecfef', '#ffffff', '#ff4757']
                });
                confetti({
                    particleCount: 4,
                    angle: 120,
                    spread: 50,
                    origin: { x: 1 },
                    colors: ['#ff9a9e', '#fecfef', '#ffffff', '#ff4757']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
