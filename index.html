<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">

    <title>Ujian Persahabatan 🗿</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --peach: #ffd9c7;
            --pink: #ffb5c9;
            --lilac: #d9b8ff;
            --sky: #b8e3ff;
            --cream: #fff6ee;
            --plum: #6b4a63;
            --accent: #ff7d97;
            --accent-dark: #e85f7c;
            --mint: #b7f0d6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        html, body {
            min-height: 100vh;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(160deg, var(--peach) 0%, var(--pink) 35%, var(--lilac) 70%, var(--sky) 100%);
            background-size: 300% 300%;
            animation: gradientBG 18s ease infinite;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 30%; }
            50% { background-position: 100% 70%; }
            100% { background-position: 0% 30%; }
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(50px);
            opacity: 0.55;
            z-index: 0;
            animation: blobDrift 14s ease-in-out infinite;
        }
        .blob:nth-child(1) { width: 260px; height: 260px; background: var(--mint); top: -60px; left: -60px; animation-duration: 16s; }
        .blob:nth-child(2) { width: 220px; height: 220px; background: var(--sky); bottom: -50px; right: -40px; animation-duration: 20s; animation-delay: -4s; }
        .blob:nth-child(3) { width: 180px; height: 180px; background: var(--lilac); bottom: 10%; left: -50px; animation-duration: 12s; animation-delay: -2s; }
        .blob:nth-child(4) { width: 150px; height: 150px; background: var(--peach); top: 12%; right: -30px; animation-duration: 18s; animation-delay: -6s; }
        .blob:nth-child(5) { width: 130px; height: 130px; background: #fff2c4; top: 60%; right: 6%; animation-duration: 15s; animation-delay: -3s; opacity: 0.4; }

        .pattern-layer {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.16;
            background-image: radial-gradient(circle, rgba(255,255,255,0.9) 2px, transparent 2.5px);
            background-size: 42px 42px;
        }

        @keyframes blobDrift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(25px, -20px) scale(1.08); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 34px;
            padding: 34px 24px;
            text-align: center;
            width: 100%;
            max-width: 420px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 60px rgba(150, 90, 130, 0.25), inset 0 1px 0 rgba(255,255,255,0.6);
            z-index: 10;
            position: relative;
            transition: transform 0.3s ease, left 0.1s ease, top 0.1s ease;
            animation: floatUpIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .glass-card:hover {
            transform: translateY(-4px);
        }

        .enter-item {
            opacity: 0;
            animation: itemPopIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .enter-1 { animation-delay: 0.15s; }
        .enter-2 { animation-delay: 0.3s; }
        .enter-3 { animation-delay: 0.45s; }
        .enter-4 { animation-delay: 0.6s; }
        .enter-5 { animation-delay: 0.75s; }

        @keyframes itemPopIn {
            0% { opacity: 0; transform: translateY(16px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 125, 151, 0.15);
            color: var(--accent-dark);
            font-family: 'Baloo 2', 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            padding: 6px 16px;
            border-radius: 50px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 125, 151, 0.3);
        }

        .corner-sticker {
            position: absolute;
            font-size: 1.6rem;
            opacity: 0.85;
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.1));
            pointer-events: none;
        }
        .corner-sticker.tl { top: -14px; left: -10px; transform: rotate(-18deg); }
        .corner-sticker.tr { top: -12px; right: -8px; transform: rotate(15deg); }
        .corner-sticker.bl { bottom: -10px; left: -6px; transform: rotate(10deg); }
        .corner-sticker.br { bottom: -12px; right: -10px; transform: rotate(-12deg); }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0 16px;
            color: rgba(107, 74, 99, 0.35);
            font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,125,151,0.4), transparent);
        }

        .footer-note {
            margin-top: 20px;
            font-size: 0.78rem !important;
            font-weight: 600;
            color: rgba(122, 90, 113, 0.7);
            letter-spacing: 0.3px;
        }

        .gif-container {
            margin: 0 auto 18px;
            border-radius: 20px;
            background: rgba(255,255,255,0.4);
            padding: 8px;
            border: 3px solid rgba(255,255,255,0.8);
            font-size: 4rem;
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(150, 90, 130, 0.18);
        }

        h1 {
            color: var(--plum);
            font-family: 'Baloo 2', 'Quicksand', sans-serif;
            font-size: 1.7rem;
            font-weight: 800;
            margin-bottom: 10px;
            line-height: 1.25;
        }

        p {
            color: #7a5a71;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 22px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 14px;
            position: relative;
            min-height: 60px;
        }

        button {
            font-size: 0.98rem;
            font-family: 'Baloo 2', 'Quicksand', sans-serif;
            font-weight: 700;
            padding: 13px 26px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
        }

        #btn-yes {
            background: linear-gradient(135deg, #ffffff, #ffe9ef);
            color: var(--accent-dark);
            box-shadow: 0 6px 14px rgba(255, 125, 151, 0.25), 0 3px 0 #f2c9d3;
        }
        #btn-yes:active {
            transform: translateY(3px);
            box-shadow: 0 2px 6px rgba(255, 125, 151, 0.25), 0 0 0 #f2c9d3;
        }

        #btn-no {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #fff;
            box-shadow: 0 6px 14px rgba(232, 95, 124, 0.4), 0 3px 0 #c94a68;
            position: absolute;
        }

        @keyframes floatUpIn {
            0% { opacity: 0; transform: translateY(35px) scale(0.92); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body>

    <div class="pattern-layer"></div>
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>

    <div class="glass-card" id="main-card">
        <span class="corner-sticker tl">💸</span>
        <span class="corner-sticker tr">🧠</span>
        <span class="corner-sticker bl">🗿</span>
        <span class="corner-sticker br">🍕</span>

        <span class="eyebrow enter-item enter-1" id="eyebrow">🚨 Ujian Persahabatan</span>

        <div id="card-content">
            <div class="gif-container enter-item enter-2">
                <span id="emoji-main">👀</span>
            </div>

            <h1 id="title" class="enter-item enter-3">Mau Traktir Aku Makan Gak? 🥺</h1>
            <p id="desc" class="enter-item enter-3">Katanya sahabat sejati dunia akhirat, dompetku lagi mode hemat energi nih... 👉👈</p>

            <div class="btn-container enter-item enter-4">
                <button id="btn-yes" onclick="gaskeun()">Gaskeun! 🌟</button>
                <button id="btn-no" onmouseover="kabur()" onclick="kabur()">Ogah!</button>
            </div>

            <div class="divider enter-item enter-5" id="divider">🍕🍕🍕</div>
            <p class="footer-note enter-item enter-5" id="footer-note">Dibuat oleh perut yang lapar</p>
        </div>
    </div>

    <script>
        function kabur() {
            const btnNo = document.getElementById('btn-no');
            // Menghitung posisi acak di dalam kontainer tombol agar tidak keluar layar jauh
            const x = Math.random() * 160 - 80; 
            const y = Math.random() * 120 - 60;
            
            btnNo.style.transform = `translate(${x}px, ${y}px)`;
            
            // Mengubah emoji pas temen berusaha klik "Ogah!"
            const emojis = ['😜', '😝', '😛', '😏', '🤣'];
            const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            document.getElementById('emoji-main').innerText = randomEmoji;
        }

        function gaskeun() {
            // Mengubah teks saat tombol "Gaskeun!" ditekan
            document.getElementById('title').innerText = "ASIKKK! SAYANG KAMU! ❤️";
            document.getElementById('desc').innerText = "Ditunggu ya transferan atau ajakannya. Kamu emang temen terbaik sepanjang masa! 😭✨";
            document.getElementById('emoji-main').innerText = '🥳';
            
            // Sembunyikan tombol setelah dipilih
            document.getElementById('btn-yes').style.display = 'none';
            document.getElementById('btn-no').style.display = 'none';

            // Ledakan selebrasi confetti
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 }
            });
        }
    </script>
</body>
</html>
